name: Build Unsigned IPA

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    env:
      APP_VERSION: 1.0.${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build/source-packages
          key: ${{ runner.os }}-spm-${{ hashFiles('Immersive Reader.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build unsigned IPA
        run: bash ./build_unsigned.sh

      - name: Publish unsigned IPA release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: export/ImmersiveReader-unsigned.ipa
          fail_on_unmatched_files: true
